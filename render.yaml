services:
  - type: web
    name: jtlh-ltd
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CONTACT_TO_EMAIL
        value: jtlhltd@gmail.com
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
